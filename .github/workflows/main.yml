name: Main Branch Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate:
    name: Build Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java (for Android build check)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Expo Prebuild (Generate Android Native Code)
        run: pnpm --filter mobile exec expo prebuild --platform android --clean

      - name: Expo Export Validation (JS Bundle)
        run: pnpm --filter mobile exec expo export --platform android --output-dir /tmp/omnia-android-export

      - name: Android Debug Build Validation
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug
