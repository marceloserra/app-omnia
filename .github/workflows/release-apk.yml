name: Release APK

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK and Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for automated release notes

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.3
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo Prebuild (Generate Android Native Code)
        run: pnpm --filter mobile exec expo prebuild --platform android --clean

      - name: Build Android APK (Release)
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease

      - name: Rename and Move APK
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          APK_PATH="apps/mobile/android/app/build/outputs/apk/release/app-release.apk"
          NEW_APK_NAME="Omnia-${TAG_NAME}.apk"
          mv $APK_PATH ./$NEW_APK_NAME
          echo "APK_FILE=$NEW_APK_NAME" >> $GITHUB_ENV

      - name: Generate Checksums
        run: |
          sha256sum ${{ env.APK_FILE }} > checksums.sha256
          cat checksums.sha256

      - name: Extract Release Notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > RELEASE_NOTES.md

      - name: Generate Release Notes
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            ${{ env.APK_FILE }}
            checksums.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
