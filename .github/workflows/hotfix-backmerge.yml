name: Hotfix Back-Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  back-merge-main-to-develop:
    name: Open main to develop back-merge PR
    if: ${{ github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'hotfix/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge main into back-merge branch
        env:
          BACKMERGE_BRANCH: automation/back-merge-main-to-develop-pr-${{ github.event.pull_request.number }}
        run: |
          git fetch origin main develop
          git checkout -B "$BACKMERGE_BRANCH" origin/develop
          git merge --no-ff origin/main -m "chore(release): back-merge main into develop after hotfix #${{ github.event.pull_request.number }}"

          if git diff --quiet origin/develop HEAD; then
            echo "No back-merge changes required."
            echo "BACKMERGE_REQUIRED=false" >> "$GITHUB_ENV"
          else
            echo "BACKMERGE_REQUIRED=true" >> "$GITHUB_ENV"
            echo "BACKMERGE_BRANCH=$BACKMERGE_BRANCH" >> "$GITHUB_ENV"
          fi

      - name: Push back-merge branch
        if: env.BACKMERGE_REQUIRED == 'true'
        run: git push origin "HEAD:${BACKMERGE_BRANCH}" --force-with-lease

      - name: Open back-merge PR
        if: env.BACKMERGE_REQUIRED == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > /tmp/backmerge-pr-body.md <<'EOF'
          ## Summary

          - Back-merges main into develop after hotfix PR #${{ github.event.pull_request.number }}.
          - Keeps develop aligned with the production patch released from main.

          ## Verification

          - This PR was generated by the Hotfix Back-Merge workflow.
          - CI must pass before merge.

          ## Risk

          - If this PR contains conflicts or unexpected changes, close it and perform the back-merge manually.
          EOF

          gh pr create \
            --base develop \
            --head "$BACKMERGE_BRANCH" \
            --title "chore(release): back-merge main after hotfix #${{ github.event.pull_request.number }}" \
            --body-file /tmp/backmerge-pr-body.md
